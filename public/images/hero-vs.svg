<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <radialGradient id="bg-seren" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a1a"/>
    </radialGradient>
    <radialGradient id="bg-taffy" cx="70%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#431407"/>
      <stop offset="100%" stop-color="#0f0a1a"/>
    </radialGradient>
    <linearGradient id="seren-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="taffy-side" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="seren-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="taffy-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="vs-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="big-glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left side background (Seren) -->
  <rect x="0" y="0" width="400" height="300" fill="url(#bg-seren)"/>
  <rect x="0" y="0" width="400" height="300" fill="url(#seren-side)"/>

  <!-- Right side background (Taffy) -->
  <rect x="500" y="0" width="400" height="300" fill="url(#bg-taffy)"/>
  <rect x="500" y="0" width="400" height="300" fill="url(#taffy-side)"/>

  <!-- Center divider glow -->
  <rect x="440" y="0" width="20" height="300" fill="#0f0a1a"/>

  <!-- VS Circle background -->
  <circle cx="450" cy="150" r="70" fill="#0f0a1a" filter="url(#big-glow)" opacity="0.8"/>
  <circle cx="450" cy="150" r="60" fill="none" stroke="url(#vs-grad)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="450" cy="150" r="50" fill="#0f0a1a"/>

  <!-- VS Text -->
  <text x="450" y="168" text-anchor="middle" font-size="52" font-weight="900" fill="url(#vs-grad)" filter="url(#glow)">VS</text>

  <!-- Seren's side content -->
  <!-- Vampire silhouette -->
  <g transform="translate(100, 150)">
    <!-- Cute vampire silhouette -->
    <ellipse cx="0" cy="-60" rx="50" ry="55" fill="#2d1b69" opacity="0.9"/>
    <!-- Hair flowing -->
    <path d="M-50,-80 Q-70,-40 -60,20 Q-50,60 -40,80" stroke="#7c3aed" stroke-width="8" fill="none" opacity="0.6"/>
    <path d="M50,-80 Q70,-40 60,20 Q50,60 40,80" stroke="#7c3aed" stroke-width="8" fill="none" opacity="0.6"/>
    <!-- Peony flower -->
    <circle cx="0" cy="-110" r="18" fill="#ec4899" opacity="0.8"/>
    <circle cx="0" cy="-110" r="10" fill="#fcd34d"/>
    <!-- Fang -->
    <path d="M-8,10 L-5,22 L-2,10" fill="white"/>
    <path d="M2,10 L5,22 L8,10" fill="white"/>
  </g>
  <text x="200" y="230" text-anchor="middle" font-size="22" font-weight="900" fill="#a78bfa">東雪蓮</text>
  <text x="200" y="252" text-anchor="middle" font-size="11" fill="#6b7280">Azuma Seren</text>

  <!-- Taffy's side content -->
  <g transform="translate(700, 150)">
    <!-- Taffy silhouette -->
    <ellipse cx="0" cy="-60" rx="50" ry="55" fill="#431407" opacity="0.9"/>
    <!-- Hair flowing -->
    <path d="M-50,-80 Q-70,-40 -60,20 Q-50,60 -40,80" stroke="#f59e0b" stroke-width="8" fill="none" opacity="0.6"/>
    <path d="M50,-80 Q70,-40 60,20 Q50,60 40,80" stroke="#f59e0b" stroke-width="8" fill="none" opacity="0.6"/>
    <!-- Star hair ties -->
    <g transform="translate(-55,-70)" opacity="0.9">
      <polygon points="0,-10 2.5,-3.5 10,-3.5 4,1.5 6.5,9 0,4.5 -6.5,9 -4,1.5 -10,-3.5 -2.5,-3.5" fill="#fcd34d"/>
    </g>
    <g transform="translate(55,-70)" opacity="0.9">
      <polygon points="0,-10 2.5,-3.5 10,-3.5 4,1.5 6.5,9 0,4.5 -6.5,9 -4,1.5 -10,-3.5 -2.5,-3.5" fill="#fcd34d"/>
    </g>
    <!-- Ace letter -->
    <text x="0" y="-5" text-anchor="middle" font-size="30" font-weight="900" fill="#fcd34d" opacity="0.9">A</text>
  </g>
  <text x="700" y="230" text-anchor="middle" font-size="22" font-weight="900" fill="#f59e0b">永雛塔菲</text>
  <text x="700" y="252" text-anchor="middle" font-size="11" fill="#6b7280">Ace Taffy</text>

  <!-- Lightning bolt in center -->
  <text x="450" y="268" text-anchor="middle" font-size="28" fill="#fcd34d" filter="url(#glow)">⚡</text>

  <!-- Top sparks -->
  <g opacity="0.5">
    <text x="200" y="50" font-size="14" fill="#a78bfa">✦</text>
    <text x="150" y="80" font-size="10" fill="#7c3aed">✦</text>
    <text x="700" y="50" font-size="14" fill="#f59e0b">✦</text>
    <text x="750" y="80" font-size="10" fill="#ea580c">✦</text>
    <text x="450" y="40" font-size="16" fill="#fcd34d">★</text>
  </g>
</svg>
