<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#431407"/>
      <stop offset="100%" stop-color="#0f0a1a"/>
    </radialGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="hair-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="clothes" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="eyes" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="180" rx="120" ry="140" fill="#f59e0b" opacity="0.08" filter="url(#softGlow)"/>

  <!-- Sparks/stars decoration -->
  <g opacity="0.6">
    <text x="320" y="80" font-size="20" fill="#fcd34d" filter="url(#glow)">✦</text>
    <text x="60" y="120" font-size="14" fill="#fcd34d" filter="url(#glow)">✦</text>
    <text x="340" y="180" font-size="12" fill="#fcd34d" filter="url(#glow)">★</text>
    <text x="50" y="200" font-size="16" fill="#fcd34d" filter="url(#glow)">✦</text>
    <text x="330" y="300" font-size="18" fill="#fcd34d" filter="url(#glow)">★</text>
    <text x="70" y="310" font-size="12" fill="#fcd34d" filter="url(#glow)">✦</text>
  </g>

  <!-- Character: Upper body -->
  <g transform="translate(200, 200)">

    <!-- Hair back -->
    <ellipse cx="0" cy="-40" rx="95" ry="100" fill="url(#hair)" opacity="0.9"/>

    <!-- Face -->
    <ellipse cx="0" cy="-30" rx="72" ry="82" fill="#fef3c7"/>

    <!-- Blush -->
    <ellipse cx="-40" cy="0" rx="18" ry="10" fill="#fdba74" opacity="0.5"/>
    <ellipse cx="40" cy="0" rx="18" ry="10" fill="#fdba74" opacity="0.5"/>

    <!-- Eyes -->
    <g filter="url(#glow)">
      <!-- Left eye -->
      <ellipse cx="-28" cy="-35" rx="22" ry="26" fill="url(#eyes)"/>
      <ellipse cx="-28" cy="-35" rx="16" ry="20" fill="#431407"/>
      <ellipse cx="-28" cy="-35" rx="8" ry="10" fill="#fcd34d"/>
      <ellipse cx="-22" cy="-42" rx="6" ry="7" fill="white" opacity="0.9"/>
      <!-- Right eye -->
      <ellipse cx="28" cy="-35" rx="22" ry="26" fill="url(#eyes)"/>
      <ellipse cx="28" cy="-35" rx="16" ry="20" fill="#431407"/>
      <ellipse cx="28" cy="-35" rx="8" ry="10" fill="#fcd34d"/>
      <ellipse cx="34" cy="-42" rx="6" ry="7" fill="white" opacity="0.9"/>
    </g>

    <!-- Eyebrows (more energetic) -->
    <path d="M-48,-68 Q-28,-74 -8,-66" stroke="#b45309" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M8,-66 Q28,-74 48,-68" stroke="#b45309" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M0,-10 Q4,-5 0,0 Q-4,-5 0,-10" fill="#fed7aa" opacity="0.6"/>

    <!-- Mouth (energetic smile) -->
    <path d="M-18,15 Q0,28 18,15" stroke="#b45309" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M-10,18 Q0,24 10,18" fill="#ef4444" opacity="0.3"/>

    <!-- Hair front bangs -->
    <path d="M-72,-90 Q-55,-125 -30,-90 Q-10,-115 0,-85 Q10,-110 30,-90 Q55,-125 72,-90 Q50,-50 0,-55 Q-50,-50 -72,-90Z" fill="url(#hair)"/>

    <!-- Side hair with accessories -->
    <path d="M-72,-80 Q-88,-20 -82,30 Q-78,60 -68,80 Q-58,40 -62,0 Q-58,-40 -72,-80Z" fill="url(#hair)"/>
    <path d="M72,-80 Q88,-20 82,30 Q78,60 68,80 Q58,40 62,0 Q58,-40 72,-80Z" fill="url(#hair)"/>

    <!-- Hair tie left (star shape) -->
    <g transform="translate(-78,-60)">
      <polygon points="0,-12 3,-4 12,-4 5,2 8,12 0,6 -8,12 -5,2 -12,-4 -3,-4" fill="url(#spark)" filter="url(#glow)"/>
    </g>
    <!-- Hair tie right -->
    <g transform="translate(78,-60)">
      <polygon points="0,-12 3,-4 12,-4 5,2 8,12 0,6 -8,12 -5,2 -12,-4 -3,-4" fill="url(#spark)" filter="url(#glow)"/>
    </g>

    <!-- Clothes upper -->
    <path d="M-60,90 Q-80,120 -70,160 L70,160 Q80,120 60,90 Q0,100 -60,90Z" fill="url(#clothes)"/>
    <!-- Collar detail -->
    <path d="M-30,90 Q0,105 30,90" stroke="#fcd34d" stroke-width="2" fill="none"/>

    <!-- Necklace (ace symbol) -->
    <path d="M-15,88 Q0,96 15,88" stroke="#fcd34d" stroke-width="2" fill="none"/>
    <text x="0" y="100" text-anchor="middle" font-size="16" fill="#fcd34d" font-weight="bold">A</text>
  </g>

  <!-- Bottom fade -->
  <rect x="0" y="340" width="400" height="60" fill="url(#bg)" opacity="0.5"/>
</svg>
